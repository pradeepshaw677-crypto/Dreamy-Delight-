<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Menu - Dreamy Delight</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #FCF9F2;
    padding-bottom: 80px;
}

.header {
    background: #FFE66D;
    padding: 15px;
    text-align: center;
    font-size: 22px;
    font-weight: 900;
}

.grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 15px;
    padding: 15px;
}

.card {
    background: white;
    border-radius: 15px;
    padding: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    text-align: center;
}

.card img {
    width: 100%;
    height: 130px;
    object-fit: cover;
    border-radius: 10px;
}

button {
    background: #E76F51;
    color: white;
    border: none;
    padding: 8px 12px;
    margin-top: 8px;
    border-radius: 10px;
    cursor: pointer;
}

.top-bar {
    display: flex;
    justify-content: space-between;
    padding: 10px 15px;
    background: white;
    position: sticky;
    top: 0;
}

.cart {
    font-weight: bold;
}
</style>
</head>

<body>

<div class="header">🍔 Menu</div>

<div class="top-bar">
    <div id="catTitle">All Items</div>
    <div class="cart">🛒 Cart: <span id="cartCount">0</span></div>
</div>

<div class="grid" id="menuGrid"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="firebase-config.js"></script>

<script>
const db = firebase.database();

let selectedCategory = localStorage.getItem("userSelectedCategoryIntent") || "all";

// CART
let cart = JSON.parse(localStorage.getItem("myCart")) || [];

document.addEventListener("DOMContentLoaded", () => {
    updateCartUI();
    loadMenu();
});

// LOAD MENU FROM FIREBASE
function loadMenu() {
    db.ref("menu_items").once("value", snap => {
        if (!snap.exists()) return;

        let items = Object.values(snap.val());

        if (selectedCategory !== "all") {
            items = items.filter(i => i.category === selectedCategory);
        }

        document.getElementById("catTitle").innerText = selectedCategory.toUpperCase();

        render(items);
    });
}

// RENDER MENU
function render(items) {
    const grid = document.getElementById("menuGrid");
    grid.innerHTML = "";

    items.forEach(item => {
        grid.innerHTML += `
            <div class="card">
                <img src="${item.img}">
                <h3>${item.name}</h3>
                <p>₹ ${item.price}</p>
                <button onclick="addToCart('${item.id}', '${item.name}', ${item.price}, '${item.img}')">
                    Add to Cart
                </button>
            </div>
        `;
    });
}

// ADD TO CART
function addToCart(id, name, price, img) {
    let existing = cart.find(i => i.id === id);

    if (existing) {
        existing.qty += 1;
    } else {
        cart.push({ id, name, price, img, qty: 1 });
    }

    localStorage.setItem("myCart", JSON.stringify(cart));
    updateCartUI();
}

// UPDATE CART COUNT
function updateCartUI() {
    let total = 0;
    cart.forEach(i => total += i.qty);

    document.getElementById("cartCount").innerText = total;
}
</script>

</body>
</html>
